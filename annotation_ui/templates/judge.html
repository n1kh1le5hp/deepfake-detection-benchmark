<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Phase-2 Perception Study</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; text-align: center; margin-top: 24px; }
    img { max-width: 384px; border: 4px solid #333; border-radius: 8px; image-rendering: -webkit-optimize-contrast; }
    .bar { color: #888; font-size: 14px; margin-bottom: 16px; }
    form { margin-top: 18px; }
    button { font-size: 18px; padding: 12px 28px; margin: 0 8px; border: none; border-radius: 6px; cursor: pointer; }
    .real { background: #2e7d32; color: #fff; }
    .fake { background: #c62828; color: #fff; }
    .pid { position: fixed; top: 8px; right: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="pid">Participant #{{ pid }}</div>
  <div class="bar">Judged {{ n_done }} / {{ n_total }}</div>
  <img src="/img/{{ uid }}" alt="candidate">
  <form action="/vote" method="post">
    <input type="hidden" name="uid" value="{{ uid }}">
    <button class="real" name="choice" value="real">Looks REAL</button>
    <button class="fake" name="choice" value="fake">Looks FAKE</button>
  </form>
</body>
</html>
